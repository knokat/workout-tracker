<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Katjas Tracker">
<meta name="theme-color" content="#0d0d1a">
<title>Katjas Workout Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d1a;--bg2:#10102a;--bg3:#141428;--bg4:#1c1c38;--brd:#252545;--brd2:#3d3d65;--t1:#fff;--t2:#ddd;--t3:#7a7e95;--t4:#5a5e75;--acc:#00d4aa;--wrn:#ff9f43;--dng:#ff6b6b;--prp:#c792ea;--accA:rgba(0,212,170,.15);--wrnA:rgba(255,159,67,.15);--dngA:rgba(255,107,107,.15)}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;min-height:100dvh;overflow-x:hidden}
input,select{background:var(--bg4);border:2px solid var(--brd2);border-radius:8px;color:#fff;padding:10px;font-size:17px;font-weight:600;width:100%;outline:none;font-variant-numeric:tabular-nums;transition:border-color .2s,box-shadow .2s;font-family:inherit}
input:focus,select:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--accA)}
input::placeholder{color:var(--t4);font-weight:400}
select option{background:var(--bg4);color:#fff}
button{cursor:pointer;border:none;font-family:inherit}
button:active{opacity:.7}
#root{max-width:480px;margin:0 auto}
.crd{background:var(--bg2);border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--brd)}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#00d4aa;font-size:18px">🏋️ Laden...</div></div>
<script type="module" src="js/app.js"></script>
</body>
</html>
