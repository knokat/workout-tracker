<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Katjas Tracker - Test</title>
<style>
body { background: #0d0d1a; color: #fff; font-family: -apple-system, sans-serif; padding: 20px; text-align: center; }
.status { margin: 10px 0; padding: 10px; border-radius: 8px; font-size: 14px; }
.ok { background: #1a3a2a; color: #00d4aa; }
.err { background: #3a1a1a; color: #ff6b6b; }
.pending { background: #1a1a30; color: #7a7e95; }
button { background: #00d4aa; color: #0d0d1a; border: none; border-radius: 8px; padding: 12px 24px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px; }
input { background: #1c1c38; border: 2px solid #3d3d65; border-radius: 8px; color: #fff; padding: 10px; font-size: 15px; width: 260px; margin: 6px 0; display: block; margin-left: auto; margin-right: auto; }
input:focus { outline: none; border-color: #00d4aa; }
#log { text-align: left; margin-top: 20px; font-size: 12px; color: #7a7e95; white-space: pre-wrap; background: #10102a; padding: 10px; border-radius: 8px; max-height: 200px; overflow-y: auto; }
</style>
</head>
<body>

<h2>🏋️ Katjas Tracker</h2>
<h3>Verbindungstest</h3>

<div id="html-status" class="status ok">✓ HTML lädt korrekt</div>
<div id="supa-status" class="status pending">⏳ Supabase wird geladen...</div>
<div id="auth-status" class="status pending">⏳ Auth wird geprüft...</div>

<div id="login-form" style="display:none; margin-top: 20px;">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="pw" placeholder="Passwort">
  <br>
  <button onclick="doLogin()">Einloggen</button>
  <button onclick="doSignup()" style="background:#1a1a30;color:#00d4aa;margin-left:8px">Registrieren</button>
</div>

<div id="logged-in" style="display:none; margin-top: 20px;">
  <div class="status ok" id="user-info"></div>
  <button onclick="doLogout()" style="background:#3a1a1a;color:#ff6b6b">Logout</button>
</div>

<div id="log"></div>

<script type="module">
const log = (msg) => { 
  document.getElementById('log').textContent += new Date().toLocaleTimeString() + ': ' + msg + '\n'; 
  console.log(msg);
};

log('Script gestartet');

// Test 1: Supabase laden
let sb;
try {
  const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
  sb = createClient(
    'https://zkqfeqtnoxgoepmykupd.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InprcWZlcXRub3hnb2VwbXlrdXBkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMDU3NzcsImV4cCI6MjA4Nzg4MTc3N30.Uz4VTfFd76SNiP8HxOr_NFl-O1GuTPMNpQ9cZXig89E'
  );
  document.getElementById('supa-status').className = 'status ok';
  document.getElementById('supa-status').textContent = '✓ Supabase geladen';
  log('Supabase Client erstellt');
} catch(e) {
  document.getElementById('supa-status').className = 'status err';
  document.getElementById('supa-status').textContent = '✗ Supabase Fehler: ' + e.message;
  log('Supabase Fehler: ' + e.message);
}

// Test 2: Auth Session prüfen
try {
  const { data, error } = await sb.auth.getSession();
  if (error) throw error;
  
  if (data.session?.user) {
    document.getElementById('auth-status').className = 'status ok';
    document.getElementById('auth-status').textContent = '✓ Eingeloggt als: ' + data.session.user.email;
    document.getElementById('logged-in').style.display = 'block';
    document.getElementById('user-info').textContent = '✓ User: ' + data.session.user.email;
    log('Session gefunden: ' + data.session.user.email);
  } else {
    document.getElementById('auth-status').className = 'status pending';
    document.getElementById('auth-status').textContent = 'Nicht eingeloggt - bitte registrieren/einloggen';
    document.getElementById('login-form').style.display = 'block';
    log('Keine Session, Login-Form anzeigen');
  }
} catch(e) {
  document.getElementById('auth-status').className = 'status err';
  document.getElementById('auth-status').textContent = '✗ Auth Fehler: ' + e.message;
  log('Auth Fehler: ' + e.message);
}

// Login/Signup/Logout functions
window.doLogin = async () => {
  const email = document.getElementById('email').value;
  const pw = document.getElementById('pw').value;
  log('Login versuch: ' + email);
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) {
    document.getElementById('auth-status').className = 'status err';
    document.getElementById('auth-status').textContent = '✗ Login Fehler: ' + error.message;
    log('Login Fehler: ' + error.message);
  } else {
    document.getElementById('auth-status').className = 'status ok';
    document.getElementById('auth-status').textContent = '✓ Eingeloggt als: ' + data.user.email;
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('logged-in').style.display = 'block';
    document.getElementById('user-info').textContent = '✓ User: ' + data.user.email;
    log('Login erfolgreich!');
  }
};

window.doSignup = async () => {
  const email = document.getElementById('email').value;
  const pw = document.getElementById('pw').value;
  log('Registrierung: ' + email);
  const { data, error } = await sb.auth.signUp({ email, password: pw });
  if (error) {
    document.getElementById('auth-status').className = 'status err';
    document.getElementById('auth-status').textContent = '✗ Registrierung Fehler: ' + error.message;
    log('Signup Fehler: ' + error.message);
  } else {
    document.getElementById('auth-status').className = 'status ok';
    document.getElementById('auth-status').textContent = '✓ Registriert! Bitte Email bestätigen (oder direkt einloggen)';
    log('Signup erfolgreich! User: ' + JSON.stringify(data.user?.email));
  }
};

window.doLogout = async () => {
  await sb.auth.signOut();
  document.getElementById('auth-status').textContent = 'Ausgeloggt';
  document.getElementById('auth-status').className = 'status pending';
  document.getElementById('logged-in').style.display = 'none';
  document.getElementById('login-form').style.display = 'block';
  log('Ausgeloggt');
};
</script>

</body>
</html>
