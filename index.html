function calcVol(d){let t=0;Object.values(d).forEach(sets=>{if(!Array.isArray(sets))return;sets.forEach(s=>{if(s.isW)return;if(s.kg!==undefined)t+=(parseFloat(s.kg)||0)*(parseInt(s.reps)||parseInt(s.secs)||0);else{t+=(parseFloat(s.kR)||0)*(parseInt(s.rR)||parseInt(s.sR)||0);t+=(parseFloat(s.kL)||0)*(parseInt(s.rL)||parseInt(s.sL)||0)}})});return Math.round(t)}

async function dbLoad(uid){
  const{data:ws}=await sb.from('workouts').select('*').eq('user_id',uid).order('date',{ascending:true});
  const out=[];for(const w of(ws||[])){
    const{data:els}=await sb.from('exercise_logs').select('*').eq('workout_id',w.id);
    const exs={},nts={};for(const el of(els||[])){
      const{data:sl}=await sb.from('set_logs').select('*').eq('exercise_log_id',el.id).order('set_number');
      exs[el.exercise_id]=(sl||[]).map(s=>s.is_unilateral?{rR:s.reps_r||"",kR:String(s.kg_r||""),rL:s.reps_l||"",kL:String(s.kg_l||""),sR:s.secs_r||"",sL:s.secs_l||"",isW:s.is_warmup}:{reps:s.reps||"",kg:String(s.kg||""),secs:s.secs||"",isW:s.is_warmup,mvKg:s.moved_kg||0});
      if(el.note)nts[el.exercise_id]=el.note;}
    out.push({id:w.id,day:w.day,date:w.date,vol:Number(w.volume),dur:w.duration,exs,nts});}return out;}

async function dbSave(uid,day,exD,nts,astD,vol,dur){
  const{data:w,error}=await sb.from('workouts').insert({user_id:uid,day,volume:vol,duration:dur}).select().single();
  if(error){console.error(error);return null;}
  for(const[eid,sets]of Object.entries(exD)){
    if(!Array.isArray(sets)||!sets.length)continue;
    const{data:el}=await sb.from('exercise_logs').insert({workout_id:w.id,exercise_id:eid,note:nts[eid]||''}).select().single();
    if(!el)continue;const pl=Object.values(PLANS).flatMap(p=>p.ex).find(e=>e.id===eid);
    const rows=sets.map((s,i)=>{
      const ad=pl?.ast&&astD[eid]?astD[eid]:{};const bnd=pl?.band&&astD[eid]?astD[eid]:{};
      const bw=parseFloat(ad.bw||bnd.bw||0),as=parseFloat(ad.as||0),bk=parseFloat(bnd.bandKg||0);
      const moved=pl?.ast?Math.max(0,bw-as):pl?.band?Math.max(0,bw-bk):0;
      return{exercise_log_id:el.id,set_number:i+1,is_warmup:!!s.isW,is_unilateral:!!pl?.u,
        reps:parseInt(s.reps)||0,kg:parseFloat(s.kg)||0,secs:parseInt(s.secs)||0,
        reps_r:parseInt(s.rR)||0,kg_r:parseFloat(s.kR)||0,secs_r:parseInt(s.sR)||0,
        reps_l:parseInt(s.rL)||0,kg_l:parseFloat(s.kL)||0,secs_l:parseInt(s.sL)||0,
        bodyweight:bw,assistance:as||bk,moved_kg:moved};});
    await sb.from('set_logs').insert(rows);}return w;}

function Timer({sec:initS,label}){
  const[s,setS]=useState(initS);const[run,setRun]=useState(false);const[adj,setAdj]=useState(initS);const ref=useRef(null);
  useEffect(()=>{if(run&&s>0)ref.current=setInterval(()=>setS(v=>v-1),1000);else if(s<=0&&run)setRun(false);return()=>clearInterval(ref.current)},[run,s]);
  const pct=adj>0?(s/adj)*100:0,done=s<=0&&!run,mn=Math.floor(s/60),sc=s%60;
  const ad=d=>{const v=Math.max(5,adj+d);setAdj(v);if(!run)setS(v)};
  return html`<div style=${{background:'var(--bg3)',borderRadius:10,padding:'10px 14px',margin:'6px 0'}}>
    <div style=${{fontSize:12,color:'var(--t3)',marginBottom:4}}>${label}</div>
    <div style=${{display:'flex',alignItems:'center',gap:10}}>
      <div style=${{position:'relative',width:52,height:52}}>
        <svg width=52 height=52 style="transform:rotate(-90deg)"><circle cx=26 cy=26 r=22 fill="none" stroke="var(--brd)" stroke-width=3.5/>
        <circle cx=26 cy=26 r=22 fill="none" stroke=${done?'var(--acc)':s<=5&&s>0?'var(--dng)':'var(--acc)'} stroke-width=3.5 stroke-dasharray=138.2 stroke-dashoffset=${138.2*(1-pct/100)} stroke-linecap="round" style="transition:stroke-dashoffset .3s"/></svg>
        <div style=${{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:700,fontVariantNumeric:'tabular-nums',color:done?'var(--acc)':'#fff'}}>${done?'✓':`${mn}:${String(sc).padStart(2,'0')}`}</div>
      </div>
      <div style=${{display:'flex',gap:4}}>
        <button onClick=${()=>ad(-5)} style=${{background:'var(--brd)',color:'#aaa',borderRadius:5,padding:'4px 8px',fontSize:12}}>-5</button>
        <button onClick=${()=>ad(5)} style=${{background:'var(--brd)',color:'#aaa',borderRadius:5,padding:'4px 8px',fontSize:12}}>+5</button>
      </div>
      <div style=${{display:'flex',gap:4,marginLeft:'auto'}}>
        ${!run?html`<button onClick=${()=>{if(s<=0)setS(adj);setRun(true)}} style=${{background:'var(--acc)',color:'var(--bg)',borderRadius:7,width:36,height:36,fontSize:16,fontWeight:700}}>▶</button>`:
        html`<button onClick=${()=>setRun(false)} style=${{background:'var(--wrn)',color:'var(--bg)',borderRadius:7,width:36,height:36,fontSize:16,fontWeight:700}}>⏸</button>`}
        <button onClick=${()=>{setRun(false);setS(adj)}} style=${{background:'var(--brd2)',color:'#ccc',borderRadius:7,width:36,height:36,fontSize:16,fontWeight:700}}>↺</button>
      </div>
    </div>
  </div>`;
}

function EC({ex,sets,onSet,onAdd,onRm,last,lastN,ast,onAst,note,onNote}){

    <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:2}}>

        <div style=${{fontSize:12,color:'var(--acc)',marginTop:1}}>${ex.m}</div>
        <div style=${{fontSize:11,color:'var(--t4)'}}>${ex.s}×${ex.rp} · ${ex.tp}${ex.g?' · '+ex.g:''}</div>
        ${ex.w?html`<div style=${{fontSize:11,color:'var(--wrn)'}}>${ex.w}</div>`:null}
        ${ex.h?html`<div style=${{fontSize:11,color:'var(--prp)',marginTop:1}}>💡 ${ex.h}</div>`:null}
      </div>
      <div style=${{display:'flex',gap:4,flexShrink:0}}>
        <button onClick=${()=>setShN(!shN)} style=${{background:'none',color:note?'var(--wrn)':'var(--brd2)',fontSize:15}}>📝</button>
        <button onClick=${()=>setSkip(true)} style=${{borderRadius:5,padding:'4px 10px',fontSize:12,background:'var(--dngA)',color:'var(--dng)'}}>Skip</button>
      </div>

      ${lastN?html`<div style=${{background:'#1a1520',borderRadius:6,padding:'5px 8px',margin:'4px 0',fontSize:12,color:'var(--prp)'}}>📝 ${lastN}</div>`:null}
      ${shN?html`<input type=text placeholder="Notiz..." value=${note||""} onInput=${e=>onNote(e.target.value)} style=${{fontSize:13,margin:'4px 0'}}/>`:null}
      ${last&&last.length>0?html`<div style=${{background:'var(--bg3)',borderRadius:6,padding:'5px 8px',margin:'4px 0',fontSize:12,color:'var(--t3)'}}>
        Letztes Mal: ${last.map(s=>s.rR!==undefined?'R:'+(s.rR||s.sR||0)+'×'+(s.kR||0)+' L:'+(s.rL||s.sL||0)+'×'+(s.kL||0):(s.reps||s.secs||0)+(ex.noKg?'':'×'+(s.kg||0)+'kg')).join(' | ')}
      </div>`:null}
      ${ex.ast?html`<${AstMach} d=${ast||{}} onChange=${onAst}/>`:null}
      ${ex.band?html`<${AstBand} d=${ast||{}} onChange=${onAst}/>`:null}
      ${sets.map((s,i)=>ex.u?
        html`<${UR} key=${i} num=${i+1} d=${s} onChange=${d=>onSet(i,d)} isI=${ex.iso} onTW=${()=>onSet(i,{...s,isW:!s.isW})}/>`:
        html`<${SR} key=${i} num=${i+1} d=${s} onChange=${d=>{const nd={...d};if(mv!==null)nd.kg=String(mv.toFixed(1));onSet(i,nd)}} isI=${ex.iso} noKg=${ex.noKg} onTW=${()=>onSet(i,{...s,isW:!s.isW})}/>`)}
      <div style=${{display:'flex',gap:6,marginTop:4}}>
        <button onClick=${onAdd} style=${{borderRadius:5,padding:'4px 12px',fontSize:12,background:'#1a3a2a',color:'var(--acc)'}}>+ Set</button>
        ${sets.length>1?html`<button onClick=${onRm} style=${{borderRadius:5,padding:'4px 12px',fontSize:12,background:'#3a1a1a',color:'var(--dng)'}}>− Set</button>`:null}
      </div>
      ${ex.iso?html`<${Timer} sec=${ex.iS||30} label="Übungstimer"/>`:null}
      ${ex.rs>0?html`<${Timer} sec=${ex.rs} label="Pausentimer"/>`:null}
    `}

}

function FC({w,vol,prev,dur}){
  const ref=useRef(null);const[comps]=useState(()=>rndC(vol));const p=PLANS[w.day];
  const diff=prev?vol-prev:null,pct=prev?((diff/prev)*100).toFixed(0):null;
  useEffect(()=>{
    const c=ref.current;if(!c)return;const ctx=c.getContext('2d');const W=400,H=520;
    c.width=W*2;c.height=H*2;c.style.width=W+'px';c.style.height=H+'px';ctx.scale(2,2);
    const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#0d0d1a');g.addColorStop(.5,'#1a1030');g.addColorStop(1,'#0d1a1a');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=.07;ctx.fillStyle='#00d4aa';ctx.beginPath();ctx.arc(340,70,110,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff9f43';ctx.beginPath();ctx.arc(60,460,70,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    ctx.fillStyle='#fff';ctx.font='bold 20px system-ui';ctx.textAlign='center';ctx.fillText(p.icon+' KATJAS WORKOUT',W/2,38);
    ctx.font='15px system-ui';ctx.fillStyle='#00d4aa';ctx.fillText(p.name+': '+p.label,W/2,60);
    ctx.strokeStyle='#252545';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(30,75);ctx.lineTo(W-30,75);ctx.stroke();
    ctx.font='bold 40px system-ui';ctx.fillStyle='#fff';ctx.fillText(vol.toLocaleString('de-DE')+' kg',W/2,120);
    ctx.font='13px system-ui';ctx.fillStyle='#7a7e95';ctx.fillText('Gesamtvolumen bewegt',W/2,142);
    ctx.fillStyle='#5a5e75';ctx.fillText('Das entspricht ungefähr...',W/2,174);
    comps.forEach((co,i)=>{const y=200+i*35;ctx.textAlign='left';ctx.font='22px system-ui';ctx.fillText(co.e,55,y+5);ctx.font='bold 15px system-ui';ctx.fillStyle='#fff';ctx.fillText(co.a,95,y+1);ctx.font='13px system-ui';ctx.fillStyle='#7a7e95';ctx.fillText(co.n,148,y+1);ctx.fillStyle='#fff'});
    if(diff!==null){const y=395;ctx.textAlign='center';ctx.font='bold 15px system-ui';ctx.fillStyle=diff>=0?'#00d4aa':'#ff6b6b';ctx.fillText((diff>=0?'↗️':'↘️')+' '+(diff>=0?'+':'')+diff.toLocaleString('de-DE')+' kg ('+(diff>=0?'+':'')+pct+'%)',W/2,y);ctx.font='11px system-ui';ctx.fillStyle='#5a5e75';ctx.fillText('vs. letztes Mal',W/2,y+18)}
    ctx.textAlign='center';ctx.font='11px system-ui';ctx.fillStyle='#3a3a5c';ctx.fillText(new Date(w.date).toLocaleDateString('de-DE')+(dur?' · '+Math.round(dur)+' Min':'')+' · #NeverSkipLegDay',W/2,485);ctx.strokeStyle='#252545';ctx.strokeRect(8,8,W-16,H-16);
  },[vol,comps]);
  const save=()=>{const c=ref.current;const a=document.createElement('a');a.download='workout-'+new Date().toISOString().slice(0,10)+'.png';a.href=c.toDataURL('image/png');a.click()};
  return html`<div style=${{textAlign:'center'}}><canvas ref=${ref} style=${{borderRadius:12,maxWidth:'100%'}}/><button onClick=${save} style=${{background:'var(--acc)',color:'var(--bg)',borderRadius:10,padding:12,fontSize:16,fontWeight:700,width:'100%',marginTop:10}}>📸 Bild speichern</button></div>`;
}

  const[aErr,setAErr]=useState('');const[em,setEm]=useState('');const[pw,setPw]=useState('');const[isR,setIsR]=useState(false);

  useEffect(()=>{if(scr!=='workout'||!day||!user)return;clearTimeout(svT.current);svT.current=setTimeout(()=>dbSvAct(user.id,day,wd,nts,ast,optE,stT),2000);return()=>clearTimeout(svT.current)},[wd,nts,ast,optE]);

  const doAuth=async()=>{setAErr('');const{error}=isR?await sb.auth.signUp({email:em,password:pw}):await sb.auth.signInWithPassword({email:em,password:pw});if(error)setAErr(error.message)};

            <button onClick=${()=>setOptE(o=>({...o,[ex.id]:true}))} style=${{borderRadius:5,padding:'4px 12px',fontSize:12,background:'#1a3a2a',color:'var(--acc)'}}>Heute machen</button>
          </div></div>`;
        return html`<${EC} key=${ex.id} ex=${ex} sets=${wd[ex.id]||[]}
          onSet=${(i,d)=>setWd(w=>({...w,[ex.id]:w[ex.id].map((s,j)=>j===i?d:s)}))}
          onAdd=${()=>setWd(w=>({...w,[ex.id]:[...(w[ex.id]||[]),ex.u?eU():eS()]}))}
          onRm=${()=>setWd(w=>({...w,[ex.id]:w[ex.id].slice(0,-1)}))}
          last=${gLE(day,ex.id)} lastN=${gLN(day,ex.id)}
          ast=${ast[ex.id]} onAst=${d=>setAst(a=>({...a,[ex.id]:d}))}
          note=${nts[ex.id]} onNote=${v=>setNts(n=>({...n,[ex.id]:v}))}/>`;
      })}
    </div></div>`}

  if(scr==='summary'&&curW){const plan=PLANS[curW.day];const prev=all.filter(w=>w.day===curW.day&&w.id!==curW.id).slice(-1)[0];const pv=prev?.vol||0;
    return html`<div><div style=${{padding:'12px 14px'}}>
      <div style=${{textAlign:'center',marginBottom:20,paddingTop:10}}><div style=${{fontSize:42}}>🎉</div><div style=${{fontSize:22,fontWeight:800}}>Workout fertig!</div><div style=${{fontSize:15,color:'var(--acc)'}}>${plan.icon} ${plan.name} · ${curW.dur} Min</div></div>
      <div class=crd style=${{background:'linear-gradient(135deg,#1a1030,#0d1a1a)',textAlign:'center'}}>
        <div style=${{fontSize:38,fontWeight:800}}>${curW.vol.toLocaleString('de-DE')} kg</div><div style=${{fontSize:14,color:'var(--t3)'}}>Gesamtvolumen</div>
        ${pv>0?html`<div style=${{fontSize:16,fontWeight:700,marginTop:8,color:curW.vol>=pv?'var(--acc)':'var(--dng)'}}>${curW.vol>=pv?'↗️':'↘️'} ${curW.vol>=pv?'+':''}${(curW.vol-pv).toLocaleString('de-DE')} kg (${((curW.vol-pv)/pv*100).toFixed(0)}%)</div>`:null}
      </div>
      <div style=${{marginTop:16}}><${FC} w=${curW} vol=${curW.vol} prev=${pv} dur=${curW.dur}/></div>
      <button onClick=${()=>{setScr('home');setDay(null)}} style=${{background:'var(--acc)',color:'var(--bg)',borderRadius:10,padding:14,fontSize:16,fontWeight:700,width:'100%',marginTop:16}}>← Zurück</button>
    </div></div>`}

  if(scr==='history'){return html`<div>
    <div style=${{position:'sticky',top:0,zIndex:20,background:'rgba(13,13,26,.92)',backdropFilter:'blur(12px)',padding:'10px 14px',borderBottom:'1px solid var(--brd)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <button onClick=${()=>setScr('home')} style=${{background:'none',color:'var(--acc)',fontSize:14}}>← Zurück</button>
      <span style=${{fontWeight:700,fontSize:15}}>📊 Trend</span><div style=${{width:60}}/>
    </div>
    <div style=${{padding:'12px 14px'}}>
      ${[1,2,3].map(d=>{const data=all.filter(w=>w.day===d);const p=PLANS[d];if(!data.length)return null;return html`<div key=${d} class=crd style=${{marginBottom:14}}>
        <div style=${{fontSize:15,fontWeight:700,marginBottom:8}}>${p.icon} ${p.name}: ${p.label}</div>
        <div style=${{fontSize:13,color:'var(--t3)'}}>${data.map(w=>new Date(w.date).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})+': '+w.vol+'kg').join(' → ')}</div>
      </div>`})}
      <div style=${{fontSize:15,fontWeight:700,margin:'14px 0 8px'}}>Übungs-Historie</div>
      <div style=${{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap'}}>
        ${[1,2,3].map(d=>html`<button key=${d} onClick=${()=>setDay(d)} style=${{borderRadius:8,padding:'7px 16px',fontSize:13,background:day===d?'var(--accA)':'var(--bg2)',border:'1px solid '+(day===d?'var(--acc)':'var(--brd)'),color:day===d?'var(--acc)':'var(--t3)'}}>${PLANS[d].icon} ${PLANS[d].name}</button>`)}
      </div>
      ${day?PLANS[day].ex.map(ex=>{
        const hist=all.filter(w=>w.day===day&&w.exs[ex.id]).map(w=>({dt:new Date(w.date).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}),s:w.exs[ex.id],nt:w.nts?.[ex.id]||''}));
        if(!hist.length)return null;
        return html`<div key=${ex.id} class=crd style=${{padding:'10px 14px',marginBottom:6}}>
          <div style=${{fontSize:14,fontWeight:700}}>${ex.n}</div>
          <div style=${{fontSize:12,color:'var(--t4)',marginTop:4}}>
            ${hist.map((h,i)=>html`<div key=${i} style=${{display:'flex',justifyContent:'space-between',padding:'2px 0'}}>
              <span>${h.dt}${h.nt?' 📝 '+h.nt:''}</span>
              <span>${h.s.map(s=>s.rR!==undefined?'R:'+(s.rR||s.sR||0)+'×'+(s.kR||0)+' L:'+(s.rL||s.sL||0)+'×'+(s.kL||0):(s.reps||s.secs||0)+(ex.noKg?'':'×'+(s.kg||0)+'kg')).join(' | ')}</span>
            </div>`)}
          </div></div>`;
      }):null}
    </div></div>`}
  return null;
}

render(html`<${App}/>`,document.getElementById('root'));
</script>
</body>
</html>
