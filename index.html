function calcVol(d){let t=0;Object.values(d).forEach(sets=>{if(!Array.isArray(sets))return;sets.forEach(s=>{if(s.isW)return;if(s.kg!==undefined)t+=(parseFloat(s.kg)||0)*(parseInt(s.reps)||parseInt(s.secs)||0);else{t+=(parseFloat(s.kR)||0)*(parseInt(s.rR)||parseInt(s.sR)||0);t+=(parseFloat(s.kL)||0)*(parseInt(s.rL)||parseInt(s.sL)||0)}})});return Math.round(t)}

// DB
async function dbLoad(uid){
  const{data:ws}=await sb.from('workouts').select('*').eq('user_id',uid).order('date',{ascending:true});
  const out=[];
  for(const w of(ws||[])){
    const{data:els}=await sb.from('exercise_logs').select('*').eq('workout_id',w.id);
    const exs={},nts={};
    for(const el of(els||[])){
      const{data:sl}=await sb.from('set_logs').select('*').eq('exercise_log_id',el.id).order('set_number');
      exs[el.exercise_id]=(sl||[]).map(s=>s.is_unilateral?
        {rR:s.reps_r||"",kR:String(s.kg_r||""),rL:s.reps_l||"",kL:String(s.kg_l||""),sR:s.secs_r||"",sL:s.secs_l||"",isW:s.is_warmup}:
        {reps:s.reps||"",kg:String(s.kg||""),secs:s.secs||"",isW:s.is_warmup,mvKg:s.moved_kg||0});
      if(el.note)nts[el.exercise_id]=el.note;
    }
    out.push({id:w.id,day:w.day,date:w.date,vol:Number(w.volume),dur:w.duration,exs,nts});
  }
  return out;
}

async function dbSave(uid,day,exD,nts,astD,vol,dur){
  const{data:w,error}=await sb.from('workouts').insert({user_id:uid,day,volume:vol,duration:dur}).select().single();
  if(error){console.error(error);return null;}
  for(const[eid,sets]of Object.entries(exD)){
    if(!Array.isArray(sets)||!sets.length)continue;
    const{data:el}=await sb.from('exercise_logs').insert({workout_id:w.id,exercise_id:eid,note:nts[eid]||''}).select().single();
    if(!el)continue;
    const pl=Object.values(PLANS).flatMap(p=>p.ex).find(e=>e.id===eid);
    const rows=sets.map((s,i)=>{
      const ad=pl?.ast&&astD[eid]?astD[eid]:{};
      const bw=parseFloat(ad.bw)||0,as=parseFloat(ad.as)||0;
      return{exercise_log_id:el.id,set_number:i+1,is_warmup:!!s.isW,is_unilateral:!!pl?.u,
        reps:parseInt(s.reps)||0,kg:parseFloat(s.kg)||0,secs:parseInt(s.secs)||0,
        reps_r:parseInt(s.rR)||0,kg_r:parseFloat(s.kR)||0,secs_r:parseInt(s.sR)||0,
        reps_l:parseInt(s.rL)||0,kg_l:parseFloat(s.kL)||0,secs_l:parseInt(s.sL)||0,
        bodyweight:bw,assistance:as,moved_kg:pl?.ast?Math.max(0,bw-as):0};
    });
    await sb.from('set_logs').insert(rows);
  }
  return w;
}

async function dbSvAct(uid,day,d,n,a,o,st){
  const p={user_id:uid,day,data:{d,n,a,o,st},saved_at:new Date().toISOString()};
  const{data:ex}=await sb.from('active_workouts').select('id').eq('user_id',uid).maybeSingle();
  if(ex)await sb.from('active_workouts').update(p).eq('user_id',uid);
  else await sb.from('active_workouts').insert(p);
}

// TIMER
function Timer({sec:initS,label}){
  const[s,setS]=useState(initS);const[run,setRun]=useState(false);const[adj,setAdj]=useState(initS);const ref=useRef(null);
  useEffect(()=>{if(run&&s>0)ref.current=setInterval(()=>setS(v=>v-1),1000);else if(s<=0&&run)setRun(false);return()=>clearInterval(ref.current)},[run,s]);
  const pct=adj>0?(s/adj)*100:0,done=s<=0&&!run,mn=Math.floor(s/60),sc=s%60;
  const ad=d=>{const v=Math.max(5,adj+d);setAdj(v);if(!run)setS(v)};
  return html`<div style=${{background:'var(--bg3)',borderRadius:10,padding:'10px 14px',margin:'6px 0'}}>
    <div style=${{fontSize:10,color:'var(--t3)',marginBottom:4}}>${label}</div>
    <div style=${{display:'flex',alignItems:'center',gap:10}}>
      <div style=${{position:'relative',width:48,height:48}}>
        <svg width=48 height=48 style="transform:rotate(-90deg)"><circle cx=24 cy=24 r=20 fill="none" stroke="var(--brd)" stroke-width=3.5/>
        <circle cx=24 cy=24 r=20 fill="none" stroke=${done?'var(--acc)':s<=5&&s>0?'var(--dng)':'var(--acc)'} stroke-width=3.5 stroke-dasharray=125.7 stroke-dashoffset=${125.7*(1-pct/100)} stroke-linecap="round" style="transition:stroke-dashoffset .3s"/></svg>
        <div style=${{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,fontVariantNumeric:'tabular-nums',color:done?'var(--acc)':'#fff'}}>${done?'\u2713':`${mn}:${String(sc).padStart(2,'0')}`}</div>
      </div>
      <div style=${{display:'flex',gap:4}}>
        <button onClick=${()=>ad(-5)} style=${{background:'var(--brd)',color:'#aaa',borderRadius:5,padding:'3px 7px',fontSize:10}}>-5</button>
        <button onClick=${()=>ad(5)} style=${{background:'var(--brd)',color:'#aaa',borderRadius:5,padding:'3px 7px',fontSize:10}}>+5</button>
      </div>
      <div style=${{display:'flex',gap:4,marginLeft:'auto'}}>
        ${!run?html`<button onClick=${()=>{if(s<=0)setS(adj);setRun(true)}} style=${{background:'var(--acc)',color:'var(--bg)',borderRadius:7,width:32,height:32,fontSize:14,fontWeight:700}}>\u25b6</button>`:
        html`<button onClick=${()=>setRun(false)} style=${{background:'var(--wrn)',color:'var(--bg)',borderRadius:7,width:32,height:32,fontSize:14,fontWeight:700}}>\u23f8</button>`}
        <button onClick=${()=>{setRun(false);setS(adj)}} style=${{background:'var(--brd2)',color:'#ccc',borderRadius:7,width:32,height:32,fontSize:14,fontWeight:700}}>\u21ba</button>
      </div>
    </div>
  </div>`;
}

      <div style=${{color:'var(--t4)'}}>\u2212</div>
      <div style=${{flex:1}}><div style=${{fontSize:9,color:'var(--t4)',marginBottom:2}}>Unterst\u00fctzung</div><input type=number placeholder=kg value=${d.as||""} onInput=${e=>onChange({...d,as:e.target.value})}/></div>
      <div style=${{color:'var(--t4)'}}>=</div>

// EXERCISE CARD
function EC({ex,sets,onSet,onAdd,onRm,last,lastN,ast,onAst,note,onNote}){
  const[col,setCol]=useState(false);const[skip,setSkip]=useState(false);const[shN,setShN]=useState(false);
  const mv=ex.ast&&ast?Math.max(0,(parseFloat(ast.bw)||0)-(parseFloat(ast.as)||0)):null;
  if(skip)return html`<div class=crd style=${{opacity:.35,padding:'10px 14px'}}>
    <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span style=${{color:'var(--t3)',fontSize:12,textDecoration:'line-through'}}>${ex.n}</span>
      <button onClick=${()=>setSkip(false)} style=${{borderRadius:5,padding:'3px 8px',fontSize:10,background:'var(--accA)',color:'var(--acc)'}}>Zur\u00fcck</button>
    </div></div>`;
  return html`<div class=crd>
    <div style=${{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:2}}>
      <div style=${{flex:1,cursor:'pointer'}} onClick=${()=>setCol(!col)}>
        <div style=${{fontSize:13,fontWeight:700,lineHeight:1.3}}>${ex.n} <span style=${{fontSize:10,color:'var(--t4)'}}>${col?'\u25b8':'\u25be'}</span></div>
        <div style=${{fontSize:10,color:'var(--acc)',marginTop:1}}>${ex.m}</div>
        <div style=${{fontSize:9,color:'var(--t4)'}}>${ex.s}\u00d7${ex.rp} \u00b7 ${ex.tp}${ex.g?' \u00b7 '+ex.g:''}</div>
        ${ex.w?html`<div style=${{fontSize:9,color:'var(--wrn)'}}>${ex.w}</div>`:null}
        ${ex.h?html`<div style=${{fontSize:9,color:'var(--prp)',marginTop:1}}>\u{1f4a1} ${ex.h}</div>`:null}
      </div>
      <div style=${{display:'flex',gap:4,flexShrink:0}}>
        <button onClick=${()=>setShN(!shN)} style=${{background:'none',color:note?'var(--wrn)':'var(--brd2)',fontSize:13}}>\u{1f4dd}</button>
        <button onClick=${()=>setSkip(true)} style=${{borderRadius:5,padding:'3px 8px',fontSize:10,background:'var(--dngA)',color:'var(--dng)'}}>Skip</button>
      </div>
    </div>
    ${!col&&html`
      ${lastN?html`<div style=${{background:'#1a1520',borderRadius:6,padding:'5px 8px',margin:'4px 0',fontSize:10,color:'var(--prp)'}}>\u{1f4dd} ${lastN}</div>`:null}
      ${shN?html`<input type=text placeholder="Notiz..." value=${note||""} onInput=${e=>onNote(e.target.value)} style=${{fontSize:11,margin:'4px 0'}}/>`:null}
      ${last&&last.length>0?html`<div style=${{background:'var(--bg3)',borderRadius:6,padding:'5px 8px',margin:'4px 0',fontSize:10,color:'var(--t3)'}}>
        Letztes Mal: ${last.map(s=>s.rR!==undefined?'R:'+(s.rR||s.sR||0)+'\u00d7'+(s.kR||0)+' L:'+(s.rL||s.sL||0)+'\u00d7'+(s.kL||0):(s.reps||s.secs||0)+'\u00d7'+(s.kg||0)+'kg').join(' | ')}
      </div>`:null}
      ${ex.ast?html`<${Ast} d=${ast||{}} onChange=${onAst}/>`:null}
      ${sets.map((s,i)=>ex.u?
        html`<${UR} key=${i} num=${i+1} d=${s} onChange=${d=>onSet(i,d)} isI=${ex.iso} onTW=${()=>onSet(i,{...s,isW:!s.isW})}/>`:
        html`<${SR} key=${i} num=${i+1} d=${s} onChange=${d=>{const nd={...d};if(mv!==null)nd.kg=String(mv.toFixed(1));onSet(i,nd)}} isI=${ex.iso} onTW=${()=>onSet(i,{...s,isW:!s.isW})}/>`)}
      <div style=${{display:'flex',gap:6,marginTop:4}}>
        <button onClick=${onAdd} style=${{borderRadius:5,padding:'3px 10px',fontSize:10,background:'#1a3a2a',color:'var(--acc)'}}>+ Set</button>
        ${sets.length>1?html`<button onClick=${onRm} style=${{borderRadius:5,padding:'3px 10px',fontSize:10,background:'#3a1a1a',color:'var(--dng)'}}>\u2212 Set</button>`:null}
      </div>
      ${ex.iso?html`<${Timer} sec=${ex.iS||30} label="Übungstimer"/>`:null}
      ${ex.rs>0?html`<${Timer} sec=${ex.rs} label="Pausentimer"/>`:null}
    `}
  </div>`;
}

// WARMUP

        <div style=${{flex:1}}>
          <span style=${{fontSize:11,color:ck[w.id]?'var(--t4)':'var(--t2)',textDecoration:ck[w.id]?'line-through':'none'}}>${w.n}</span>

// FUN CARD
function FC({w,vol,prev,dur}){
  const ref=useRef(null);const[comps]=useState(()=>rndC(vol));const p=PLANS[w.day];
  const diff=prev?vol-prev:null,pct=prev?((diff/prev)*100).toFixed(0):null;
  useEffect(()=>{
    const c=ref.current;if(!c)return;const ctx=c.getContext('2d');const W=400,H=520;
    c.width=W*2;c.height=H*2;c.style.width=W+'px';c.style.height=H+'px';ctx.scale(2,2);
    const g=ctx.createLinearGradient(0,0,W,H);g.addColorStop(0,'#0d0d1a');g.addColorStop(.5,'#1a1030');g.addColorStop(1,'#0d1a1a');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    ctx.globalAlpha=.07;ctx.fillStyle='#00d4aa';ctx.beginPath();ctx.arc(340,70,110,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff9f43';ctx.beginPath();ctx.arc(60,460,70,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    ctx.fillStyle='#fff';ctx.font='bold 20px system-ui';ctx.textAlign='center';ctx.fillText(p.icon+' KATJAS WORKOUT',W/2,38);
    ctx.font='15px system-ui';ctx.fillStyle='#00d4aa';ctx.fillText(p.name+': '+p.label,W/2,60);
    ctx.strokeStyle='#252545';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(30,75);ctx.lineTo(W-30,75);ctx.stroke();
    ctx.font='bold 40px system-ui';ctx.fillStyle='#fff';ctx.fillText(vol.toLocaleString('de-DE')+' kg',W/2,120);
    ctx.font='13px system-ui';ctx.fillStyle='#7a7e95';ctx.fillText('Gesamtvolumen bewegt',W/2,142);
    ctx.fillStyle='#5a5e75';ctx.fillText('Das entspricht ungef\u00e4hr...',W/2,174);
    comps.forEach((co,i)=>{const y=200+i*35;ctx.textAlign='left';ctx.font='22px system-ui';ctx.fillText(co.e,55,y+5);ctx.font='bold 15px system-ui';ctx.fillStyle='#fff';ctx.fillText(co.a,95,y+1);ctx.font='13px system-ui';ctx.fillStyle='#7a7e95';ctx.fillText(co.n,148,y+1);ctx.fillStyle='#fff'});
    if(diff!==null){const y=395;ctx.textAlign='center';ctx.font='bold 15px system-ui';ctx.fillStyle=diff>=0?'#00d4aa':'#ff6b6b';ctx.fillText((diff>=0?'\u2197\ufe0f':'\u2198\ufe0f')+' '+(diff>=0?'+':'')+diff.toLocaleString('de-DE')+' kg ('+(diff>=0?'+':'')+pct+'%)',W/2,y);ctx.font='11px system-ui';ctx.fillStyle='#5a5e75';ctx.fillText('vs. letztes Mal',W/2,y+18)}
    ctx.textAlign='center';ctx.font='11px system-ui';ctx.fillStyle='#3a3a5c';ctx.fillText(new Date(w.date).toLocaleDateString('de-DE')+(dur?' \u00b7 '+Math.round(dur)+' Min':'')+' \u00b7 #NeverSkipLegDay',W/2,485);
    ctx.strokeStyle='#252545';ctx.strokeRect(8,8,W-16,H-16);
  },[vol,comps]);
  const save=()=>{const c=ref.current;const a=document.createElement('a');a.download='workout-'+new Date().toISOString().slice(0,10)+'.png';a.href=c.toDataURL('image/png');a.click()};
  return html`<div style=${{textAlign:'center'}}><canvas ref=${ref} style=${{borderRadius:12,maxWidth:'100%'}}/><button onClick=${save} style=${{background:'var(--acc)',color:'var(--bg)',borderRadius:10,padding:12,fontSize:14,fontWeight:700,width:'100%',marginTop:10}}>\u{1f4f8} Bild speichern</button></div>`;
}

// MAIN APP
function App(){
  const[user,setUser]=useState(null);const[aLd,setALd]=useState(true);
  const[scr,setScr]=useState('home');const[day,setDay]=useState(null);
  const[wd,setWd]=useState({});const[nts,setNts]=useState({});const[ast,setAst]=useState({});
  const[optE,setOptE]=useState({});const[stT,setStT]=useState(null);
  const[all,setAll]=useState([]);const[ld,setLd]=useState(true);
  const[curW,setCurW]=useState(null);const[hasA,setHasA]=useState(false);const[actR,setActR]=useState(null);
  const[aErr,setAErr]=useState('');const[em,setEm]=useState('');const[pw,setPw]=useState('');const[isR,setIsR]=useState(false);
  const svT=useRef(null);const[saving,setSaving]=useState(false);

  useEffect(()=>{sb.auth.getSession().then(({data})=>{if(data.session?.user)setUser(data.session.user);setALd(false)});
    const{data:l}=sb.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));return()=>l.subscription.unsubscribe()},[]);

  useEffect(()=>{if(!user)return;setLd(true);Promise.all([dbLoad(user.id),dbLdAct(user.id)]).then(([w,a])=>{setAll(w||[]);if(a){setHasA(true);setActR(a)}setLd(false)})},[user]);

  useEffect(()=>{if(scr!=='workout'||!day||!user)return;clearTimeout(svT.current);svT.current=setTimeout(()=>dbSvAct(user.id,day,wd,nts,ast,optE,stT),2000);return()=>clearTimeout(svT.current)},[wd,nts,ast,optE]);

  const doAuth=async()=>{setAErr('');const{error}=isR?await sb.auth.signUp({email:em,password:pw}):await sb.auth.signInWithPassword({email:em,password:pw});if(error)setAErr(error.message)};
  const start=d=>{const p=PLANS[d];const dd={};p.ex.forEach(e=>{dd[e.id]=iSets(e)});setWd(dd);setNts({});setAst({});setOptE({});setDay(d);setStT(Date.now());setScr('workout');setHasA(false)};
  const resume=()=>{if(!actR)return;const d=actR.data;setDay(actR.day);setWd(d.d||{});setNts(d.n||{});setAst(d.a||{});setOptE(d.o||{});setStT(d.st||Date.now());setScr('workout');setHasA(false)};
  const discard=async()=>{if(user)await dbDlAct(user.id);setHasA(false);setActR(null)};
  const gL=d=>[...all].reverse().find(w=>w.day===d);
  const gLE=(d,id)=>gL(d)?.exs?.[id]||null;
  const gLN=(d,id)=>gL(d)?.nts?.[id]||null;
  const finish=async()=>{setSaving(true);const dur=stT?(Date.now()-stT)/60000:0;const vol=calcVol(wd);
    await dbSave(user.id,day,wd,nts,ast,vol,Math.round(dur));if(user)await dbDlAct(user.id);
    const w={id:Date.now().toString(),day,date:new Date().toISOString(),exs:wd,nts,vol,dur:Math.round(dur)};
    setAll(p=>[...p,w]);setCurW(w);setSaving(false);setScr('summary')};

  // AUTH LOADING
  if(aLd)return html`<div style=${{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100dvh',color:'var(--acc)',fontSize:16}}>\u{1f3cb}\ufe0f Laden...</div>`;

  // LOGIN
  if(!user)return html`<div style=${{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100dvh',padding:20}}>
    <div style=${{background:'var(--bg2)',border:'1px solid var(--brd)',borderRadius:16,padding:24,width:'100%',maxWidth:340}}>
      <div style=${{textAlign:'center',marginBottom:20}}><div style=${{fontSize:32}}>\u{1f3cb}\ufe0f</div><div style=${{fontSize:20,fontWeight:800,marginTop:8}}>Katjas Tracker</div><div style=${{fontSize:12,color:'var(--t3)',marginTop:4}}>${isR?'Account erstellen':'Einloggen'}</div></div>
      ${aErr?html`<div style=${{color:'var(--dng)',fontSize:11,marginBottom:8,textAlign:'center'}}>${aErr}</div>`:null}
      <div style=${{marginBottom:12}}><input type=email placeholder=Email value=${em} onInput=${e=>setEm(e.target.value)}/></div>
      <div style=${{marginBottom:12}}><input type=password placeholder=Passwort value=${pw} onInput=${e=>setPw(e.target.value)}/></div>
      <button onClick=${doAuth} style=${{background:'var(--acc)',color:'var(--bg)',borderRadius:10,padding:12,fontSize:14,fontWeight:700,width:'100%'}}>${isR?'Registrieren':'Einloggen'}</button>
      <button onClick=${()=>{setIsR(!isR);setAErr('')}} style=${{background:'none',color:'var(--acc)',fontSize:12,marginTop:12,width:'100%',textAlign:'center'}}>${isR?'Bereits registriert? Einloggen':'Kein Account? Registrieren'}</button>
    </div></div>`;

  // LOADING DATA
  if(ld)return html`<div style=${{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100dvh',color:'var(--acc)',fontSize:16}}>Workouts laden...</div>`;

  // HOME
  if(scr==='home'){const rec=[...all].reverse().slice(0,5);return html`<div>
    <div style=${{textAlign:'center',padding:'20px 0 14px'}}><div style=${{fontSize:20,fontWeight:800}}>KATJAS TRACKER</div><div style=${{fontSize:11,color:'var(--t4)',marginTop:3}}>Workout starten</div></div>
    ${hasA&&actR?html`<div style=${{margin:'0 14px 12px',background:'linear-gradient(135deg,#1a2a1a,#0d1a1a)',border:'1px solid #2a4a3a',borderRadius:12,padding:'12px 14px'}}>
      <div style=${{fontSize:12,fontWeight:700,color:'var(--acc)'}}>\u23f8 Unvollst\u00e4ndiges Workout</div>
      <div style=${{fontSize:10,color:'var(--t3)',marginTop:2}}>${PLANS[actR.day]?.icon} ${PLANS[actR.day]?.name}</div>
      <div style=${{display:'flex',gap:6,marginTop:8}}>
        <button onClick=${resume} style=${{background:'var(--acc)',color:'var(--bg)',borderRadius:10,padding:8,fontSize:13,fontWeight:700,flex:1}}>Fortsetzen</button>
        <button onClick=${discard} style=${{background:'var(--bg2)',color:'var(--dng)',border:'1px solid #4a2a2a',borderRadius:10,padding:8,fontSize:13,flex:1}}>Verwerfen</button>
      </div></div>`:null}
    <div style=${{display:'flex',flexDirection:'column',gap:8,padding:'0 14px'}}>
      ${[1,2,3].map(d=>{const p=PLANS[d],l=gL(d);return html`<button key=${d} onClick=${()=>start(d)} style=${{background:'linear-gradient(135deg,#151530,#12203a)',border:'1px solid var(--brd)',borderRadius:14,padding:'14px 16px',textAlign:'left',position:'relative',overflow:'hidden'}}>
        <div style=${{fontSize:28,position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',opacity:.12}}>${p.icon}</div>
        <div style=${{fontSize:15,fontWeight:700}}>${p.icon} ${p.name}</div>
        <div style=${{fontSize:12,color:'var(--acc)',marginTop:1}}>${p.label} \u00b7 ${p.loc}</div>
        ${l?html`<div style=${{fontSize:9,color:'var(--t4)',marginTop:3}}>Zuletzt: ${new Date(l.date).toLocaleDateString('de-DE')} \u00b7 ${l.vol?.toLocaleString('de-DE')} kg \u00b7 ${l.dur} Min</div>`:null}
      </button>`})}
    </div>
    ${rec.length>0?html`<div style=${{padding:'16px 14px'}}><div style=${{fontSize:13,fontWeight:700,marginBottom:8}}>Letzte Workouts</div>
      ${rec.map(w=>{const p=PLANS[w.day];return html`<div key=${w.id} style=${{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid #1a1a30',fontSize:11}}>
        <span style=${{color:'var(--t2)'}}>${p.icon} ${p.label}</span><span style=${{color:'var(--t4)'}}>${new Date(w.date).toLocaleDateString('de-DE')} \u00b7 ${w.vol?.toLocaleString('de-DE')} kg</span></div>`})}</div>`:null}
    <div style=${{display:'flex',gap:8,padding:'0 14px 20px'}}>
      <button onClick=${()=>{setDay(1);setScr('history')}} style=${{background:'var(--bg2)',color:'var(--acc)',border:'1px solid var(--brd)',borderRadius:10,padding:10,fontSize:13,fontWeight:600,flex:1}}>\u{1f4ca} Trend</button>
      <button onClick=${()=>sb.auth.signOut()} style=${{background:'var(--bg2)',color:'var(--t3)',border:'1px solid var(--brd)',borderRadius:10,padding:'10px 16px',fontSize:13}}>Logout</button>
    </div></div>`}

  // WORKOUT
  if(scr==='workout'&&day){const plan=PLANS[day];return html`<div>
    <div style=${{position:'sticky',top:0,zIndex:20,background:'rgba(13,13,26,.92)',backdropFilter:'blur(12px)',padding:'10px 14px',borderBottom:'1px solid var(--brd)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <button onClick=${()=>setScr('home')} style=${{background:'none',color:'var(--dng)',fontSize:12}}>\u2190 Zur\u00fcck</button>
      <span style=${{fontWeight:700,fontSize:13}}>${plan.icon} ${plan.label}</span>
      <button onClick=${finish} disabled=${saving} style=${{background:'var(--acc)',color:'var(--bg)',borderRadius:7,padding:'6px 14px',fontSize:12,fontWeight:700,opacity:saving?.5:1}}>${saving?'Speichern...':'\u2713 Fertig'}</button>
    </div>

      <${WU} items=${plan.wu}/>
      <div style=${{fontSize:13,fontWeight:700,margin:'14px 0 8px'}}>\u{1f4aa} \u00dcbungen</div>

        if(ex.opt&&!optE[ex.id])return html`<div key=${ex.id} class=crd style=${{background:'var(--bg)',border:'1px dashed var(--brd2)',padding:'12px 14px'}}>

          onRm=${()=>setWd(w=>({...w,[ex.id]:w[ex.id].slice(0,-1)}))}
          last=${gLE(day,ex.id)} lastN=${gLN(day,ex.id)}

        <div style=${{fontSize:36,fontWeight:800}}>${curW.vol.toLocaleString('de-DE')} kg</div><div style=${{fontSize:12,color:'var(--t3)'}}>Gesamtvolumen</div>
        ${pv>0?html`<div style=${{fontSize:14,fontWeight:700,marginTop:8,color:curW.vol>=pv?'var(--acc)':'var(--dng)'}}>${curW.vol>=pv?'\u2197\ufe0f':'\u2198\ufe0f'} ${curW.vol>=pv?'+':''}${(curW.vol-pv).toLocaleString('de-DE')} kg (${((curW.vol-pv)/pv*100).toFixed(0)}%)</div>`:null}
      </div>
      <div style=${{marginTop:16}}><${FC} w=${curW} vol=${curW.vol} prev=${pv} dur=${curW.dur}/></div>
      <button onClick=${()=>{setScr('home');setDay(null)}} style=${{background:'var(--acc)',color:'var(--bg)',borderRadius:10,padding:12,fontSize:14,fontWeight:700,width:'100%',marginTop:16}}>\u2190 Zur\u00fcck</button>
    </div></div>`}

  // HISTORY
  if(scr==='history'){return html`<div>
    <div style=${{position:'sticky',top:0,zIndex:20,background:'rgba(13,13,26,.92)',backdropFilter:'blur(12px)',padding:'10px 14px',borderBottom:'1px solid var(--brd)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <button onClick=${()=>setScr('home')} style=${{background:'none',color:'var(--acc)',fontSize:12}}>\u2190 Zur\u00fcck</button>
      <span style=${{fontWeight:700,fontSize:13}}>\u{1f4ca} Trend</span><div style=${{width:60}}/>
    </div>
    <div style=${{padding:'12px 14px'}}>
      ${[1,2,3].map(d=>{const data=all.filter(w=>w.day===d);const p=PLANS[d];if(!data.length)return null;return html`<div key=${d} class=crd style=${{marginBottom:14}}>
        <div style=${{fontSize:13,fontWeight:700,marginBottom:8}}>${p.icon} ${p.name}: ${p.label}</div>
        <div style=${{fontSize:11,color:'var(--t3)'}}>${data.map(w=>new Date(w.date).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})+': '+w.vol+'kg').join(' \u2192 ')}</div>
      </div>`})}
      <div style=${{fontSize:13,fontWeight:700,margin:'14px 0 8px'}}>\u00dcbungs-Historie</div>
      <div style=${{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap'}}>
        ${[1,2,3].map(d=>html`<button key=${d} onClick=${()=>setDay(d)} style=${{borderRadius:8,padding:'6px 14px',fontSize:11,background:day===d?'var(--accA)':'var(--bg2)',border:'1px solid '+(day===d?'var(--acc)':'var(--brd)'),color:day===d?'var(--acc)':'var(--t3)'}}>${PLANS[d].icon} ${PLANS[d].name}</button>`)}
      </div>
      ${day?PLANS[day].ex.map(ex=>{
        const hist=all.filter(w=>w.day===day&&w.exs[ex.id]).map(w=>({dt:new Date(w.date).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}),s:w.exs[ex.id],nt:w.nts?.[ex.id]||''}));
        if(!hist.length)return null;
        return html`<div key=${ex.id} class=crd style=${{padding:'10px 14px',marginBottom:6}}>
          <div style=${{fontSize:12,fontWeight:700}}>${ex.n}</div>
          <div style=${{fontSize:10,color:'var(--t4)',marginTop:4}}>
            ${hist.map((h,i)=>html`<div key=${i} style=${{display:'flex',justifyContent:'space-between',padding:'2px 0'}}>
              <span>${h.dt}${h.nt?' \u{1f4dd} '+h.nt:''}</span>
              <span>${h.s.map(s=>s.rR!==undefined?'R:'+(s.rR||s.sR||0)+'\u00d7'+(s.kR||0)+' L:'+(s.rL||s.sL||0)+'\u00d7'+(s.kL||0):(s.reps||s.secs||0)+'\u00d7'+(s.kg||0)+'kg').join(' | ')}</span>
            </div>`)}
          </div></div>`;
      }):null}
    </div></div>`}

  return null;
}

render(html`<${App}/>`,document.getElementById('root'));

</script>
</body>
</html>
